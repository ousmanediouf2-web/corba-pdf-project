# JacORB Configuration
# Placez ce fichier dans le classpath (src/main/resources/)

# ORB settings
jacorb.connection.client.pending_reply_timeout=30000
jacorb.retries=3
jacorb.retry_interval=500

# Logging
jacorb.log.default.verbosity=2

# Name service
ORBInitRef.NameService=corbaloc::localhost:1050/NameService

# Performance
jacorb.maxManagedBufSize=20
jacorb.BufferManager.release=20
