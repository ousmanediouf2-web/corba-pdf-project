[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; 1. NameService CORBA (orbd) - démarre en premier
[program:orbd]
command=/opt/java/openjdk/bin/orbd -ORBInitialPort 1050 -ORBInitialHost localhost
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/var/log/supervisor/orbd.log
stderr_logfile=/var/log/supervisor/orbd_err.log

; 2. Serveur CORBA PDF - démarre après orbd
[program:corba-server]
command=/opt/java/openjdk/bin/java
    -cp /app/corba-server.jar
    -Dorg.omg.CORBA.ORBInitialHost=localhost
    -Dorg.omg.CORBA.ORBInitialPort=1050
    com.pdfservice.server.PDFServer
autostart=true
autorestart=true
startsecs=8
priority=20
stdout_logfile=/var/log/supervisor/corba.log
stderr_logfile=/var/log/supervisor/corba_err.log

; 3. Tomcat - démarre en dernier
[program:tomcat]
command=/opt/tomcat/bin/catalina.sh run
autostart=true
autorestart=true
startsecs=15
priority=30
stdout_logfile=/var/log/supervisor/tomcat.log
stderr_logfile=/var/log/supervisor/tomcat_err.log
