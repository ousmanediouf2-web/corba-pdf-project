name: Build & Deploy - CORBA PDF Service

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ═══════════════════════════════════════════════════
  # JOB 1 : Build JAR + WAR (vérifie que le code compile)
  # ═══════════════════════════════════════════════════
  build:
    name: Build (IDL stubs + JAR + WAR)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Cache Maven
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Generer stubs CORBA depuis IDL
      run: |
        mkdir -p corba-server/src/main/java/pdfservice
        mkdir -p web-app/src/main/java/pdfservice
        idlj -fall    -td corba-server/src/main/java idl/PDFService.idl
        idlj -fclient -td web-app/src/main/java      idl/PDFService.idl
        echo "Stubs generes :"
        ls corba-server/src/main/java/pdfservice/

    - name: Build CORBA Server JAR
      run: cd corba-server && mvn clean package -DskipTests -q

    - name: Build Web App WAR
      run: cd web-app && mvn clean package -DskipTests -q

    - name: Upload artefacts de build
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          corba-server/target/corba-server-1.0-SNAPSHOT-jar-with-dependencies.jar
          web-app/target/corba-pdf-app.war
        retention-days: 7

  # ═══════════════════════════════════════════════════
  # JOB 2 : Build image Docker + push sur Docker Hub
  # ═══════════════════════════════════════════════════
  docker:
    name: Build et Push image Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build et push image Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/corba-pdf-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/corba-pdf-service:${{ github.sha }}

  # ═══════════════════════════════════════════════════
  # JOB 3 : Déclencher le redéploiement sur Render.com
  # ═══════════════════════════════════════════════════
  deploy-render:
    name: Deploy sur Render.com
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Declencher redeploy Render via API
      run: |
        curl -s -X POST \
          "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{"clearCache": false}' \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        if 'id' in data:
            print('Deploiement Render declenche avec succes !')
            print('Deploy ID:', data['id'])
            print('Status:', data.get('status', 'pending'))
        else:
            print('Reponse Render:', json.dumps(data, indent=2))
        "
