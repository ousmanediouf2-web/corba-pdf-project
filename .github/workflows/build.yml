name: Build CORBA PDF Service

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Cache Maven
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

    - name: Verifier que idlj est disponible
      run: idlj -version 2>&1 || true

    - name: Build complet (stubs IDL + JAR + WAR)
      run: mvn clean package -DskipTests

    - name: Upload artefacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          corba-server/target/corba-server-1.0-jar-with-dependencies.jar
          web-app/target/ROOT.war
        retention-days: 7
